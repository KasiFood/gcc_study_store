[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["private-downloads/**"]

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200
  force = true

[[redirects]]
  from = "/api/payfast-itn"
  to = "/.netlify/functions/payfast-itn"
  status = 200
  force = true

[[redirects]]
  from = "/api/get-download-link"
  to = "/.netlify/functions/get-download-link"
  status = 200
  force = true

[[redirects]]
  from = "/api/download-file"
  to = "/.netlify/functions/download-file"
  status = 200
  force = true

[[redirects]]
  from = "/private-downloads/*"
  to = "/404.html"
  status = 404
  force = true
