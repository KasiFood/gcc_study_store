<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirming Payment | GCC Study Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0A0C10; --surface:#1E232E; --border:rgba(255,255,255,.13); --accent:#E8A020; --green:#22C55E; --text:#F0EEE8; --muted:#8A8C94; --danger:#fca5a5; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; }
    .panel { width:min(100%,520px); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:32px; text-align:center; }
    .brand { color:var(--accent); font:500 12px 'IBM Plex Mono',monospace; letter-spacing:.08em; text-decoration:none; } .status { font-size:38px; margin:26px 0 10px; }
    h1 { font-size:26px; margin:0 0 10px; } p { color:var(--muted); line-height:1.6; } .detail { font-size:13px; margin-top:16px; }
    .download { display:inline-block; margin-top:18px; padding:14px 22px; background:var(--green); color:#07150b; border-radius:4px; text-decoration:none; font:600 13px 'IBM Plex Mono',monospace; }
    button { margin-top:14px; padding:11px 16px; border:1px solid var(--border); border-radius:4px; color:var(--text); background:transparent; cursor:pointer; font:13px 'Space Grotesk',sans-serif; }
    .error { color:var(--danger); } .back { display:block; margin-top:24px; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
  <main class="panel">
    <a class="brand" href="index.html">GCC_STUDY_HUB</a>
    <div class="status" id="icon">...</div>
    <h1 id="title">Confirming your payment</h1>
    <p id="message">Please wait while we receive confirmation from PayFast. This can take a moment.</p>
    <p id="detail" class="detail"></p>
    <a id="downloadButton" class="download" href="#" hidden>Download your purchase</a>
    <button id="retryButton" type="button" hidden>Check again</button>
    <a class="back" href="index.html">Back to store</a>
  </main>
  <script>
    const order = new URLSearchParams(window.location.search).get('order');
    const icon = document.getElementById('icon');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const detail = document.getElementById('detail');
    const downloadButton = document.getElementById('downloadButton');
    const retryButton = document.getElementById('retryButton');
    let timer;

    function waiting() {
      icon.textContent = '...';
      title.textContent = 'Confirming your payment';
      message.textContent = 'We are waiting for PayFast to confirm the transaction. Your download button stays locked until confirmation arrives.';
      detail.textContent = 'This usually takes less than a minute.';
      downloadButton.hidden = true;
      retryButton.hidden = false;
    }

    async function checkPayment() {
      if (!order) {
        icon.textContent = '!'; title.textContent = 'Order reference missing';
        message.textContent = 'Return to the store and start checkout again.'; detail.textContent = ''; return;
      }
      try {
        const response = await fetch(`/api/get-download-link?order=${encodeURIComponent(order)}`, { cache: 'no-store' });
        const result = await response.json();
        if (response.status === 202) {
          waiting();
          clearTimeout(timer);
          timer = setTimeout(checkPayment, 3000);
          return;
        }
        if (!response.ok) throw new Error(result.error || 'Could not check this payment.');
        clearTimeout(timer);
        icon.textContent = 'OK';
        title.textContent = 'Payment confirmed';
        message.textContent = `Your purchase is ready: ${result.productName}.`;
        detail.textContent = 'The secure link expires in 30 minutes.';
        downloadButton.href = result.downloadUrl;
        downloadButton.hidden = false;
        retryButton.hidden = true;
      } catch (error) {
        icon.textContent = '!'; title.textContent = 'We could not confirm payment yet';
        message.textContent = error.message;
        detail.textContent = 'Use Check again in a moment, or contact support if payment was completed.';
        retryButton.hidden = false;
      }
    }
    retryButton.addEventListener('click', checkPayment);
    checkPayment();
  </script>
</body>
</html>
