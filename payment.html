<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment | GCC Study Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0A0C10; --surface:#1E232E; --border:rgba(255,255,255,.13); --accent:#E8A020; --text:#F0EEE8; --muted:#8A8C94; --danger:#fca5a5; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; }
    .panel { width:min(100%,520px); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:32px; }
    .brand { color:var(--accent); font:500 12px 'IBM Plex Mono',monospace; letter-spacing:.08em; text-decoration:none; }
    h1 { font-size:28px; margin:22px 0 8px; } p { color:var(--muted); line-height:1.6; } .summary { margin:24px 0; padding:18px; background:#111318; border:1px solid var(--border); border-radius:6px; }
    .summary strong { display:block; font-size:16px; margin-bottom:8px; } .price { color:var(--accent); font:500 18px 'IBM Plex Mono',monospace; }
    label { display:block; margin:20px 0 8px; font-size:14px; } input { width:100%; padding:13px; color:var(--text); background:#111318; border:1px solid var(--border); border-radius:4px; font:15px 'Space Grotesk',sans-serif; }
    input:focus { outline:2px solid var(--accent); outline-offset:1px; } button { width:100%; margin-top:20px; padding:14px; border:0; border-radius:4px; background:var(--accent); color:#0A0C10; cursor:pointer; font:600 13px 'IBM Plex Mono',monospace; letter-spacing:.03em; } button:disabled { opacity:.65; cursor:wait; }
    .note { font-size:12px; margin:16px 0 0; } .error { color:var(--danger); font-size:13px; min-height:20px; margin:12px 0 0; } .back { display:inline-block; margin-top:22px; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
  <main class="panel">
    <a class="brand" href="index.html">GCC_STUDY_HUB</a>
    <h1>Secure payment</h1>
    <p>Enter the email address where you would like your order details sent.</p>
    <div class="summary" id="summary" hidden>
      <strong id="productName"></strong>
      <span class="price" id="productPrice"></span>
    </div>
    <form id="checkoutForm" novalidate hidden>
      <label for="email">Email address</label>
      <input id="email" type="email" autocomplete="email" required placeholder="you@example.com">
      <button id="payButton" type="submit">Continue to PayFast</button>
      <p class="note">You will be redirected to PayFast. Your download becomes available only after PayFast confirms the payment.</p>
      <p class="error" id="error" role="alert"></p>
    </form>
    <p class="error" id="pageError" role="alert"></p>
    <a class="back" href="index.html">Back to store</a>
  </main>
  <script>
    const PRODUCTS = {
      'gcc-mines-plant-engineering': ['GCC Mines - Plant Engineering Worked Solutions', 'R349'],
      'gcc-mines-legal-knowledge': ['GCC Mines - Legal Knowledge Worked Solutions', 'R299'],
      'gcc-mines-formula-book': ['GCC Mines - Formula Book', 'R149'],
      'gcc-mines-full-bundle': ['GCC Mines & Works - Full Study Bundle', 'R699'],
      'gcc-factories-plant-engineering': ['GCC Factories - Plant Engineering Worked Solutions', 'R349'],
      'gcc-factories-ohs-worked-solutions': ['GCC Factories - OHS Act & Regulations Worked Solutions', 'R299'],
      'gcc-factories-formula-book': ['GCC Factories - Formula Book', 'R149'],
      'gcc-factories-full-bundle': ['GCC Factories - Full Study Bundle', 'R699'],
      'gcc-application-checklist': ['GCC Application Checklist', 'R129'],
      'gcc-record-of-experience-template': ['Record of Experience Template', 'R149'],
      'gcc-candidate-roadmap': ['GCC Candidate Roadmap', 'R99']
    };
    const params = new URLSearchParams(window.location.search);
    const productSlug = params.get('product');
    const product = PRODUCTS[productSlug];
    const pageError = document.getElementById('pageError');
    if (!product) {
      pageError.textContent = 'The selected product is not available.';
    } else {
      document.getElementById('productName').textContent = product[0];
      document.getElementById('productPrice').textContent = product[1];
      document.getElementById('summary').hidden = false;
      document.getElementById('checkoutForm').hidden = false;
      if (params.get('cancelled') === '1') pageError.textContent = 'Payment was cancelled. No payment was taken.';
    }

    document.getElementById('checkoutForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const error = document.getElementById('error');
      const button = document.getElementById('payButton');
      error.textContent = '';
      button.disabled = true;
      button.textContent = 'Preparing secure checkout...';
      try {
        const response = await fetch('/api/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product: productSlug, email })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Could not create the PayFast checkout.');
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = result.action;
        Object.entries(result.fields).forEach(([name, value]) => {
          const input = document.createElement('input');
          input.type = 'hidden'; input.name = name; input.value = value; form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
      } catch (err) {
        error.textContent = err.message;
        button.disabled = false;
        button.textContent = 'Continue to PayFast';
      }
    });
  </script>
</body>
</html>
